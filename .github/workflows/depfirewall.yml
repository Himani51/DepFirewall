name: DepFirewall Security Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# REQUIRED: Grant the GitHub Action permission to upload security events
permissions:
  contents: read
  security-events: write

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    name: Dependency Firewall Scan

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Project Dependencies (for accurate registry checking)
      run: npm ci

    - name: Execute DepFirewall Scan (SARIF Format)
      # We use local tsx to run the scanner and output standard SARIF 
      # "|| true" ensures that finding vulnerabilities doesn't crash the bash step itself,
      # allowing the SARIF uploader step to grab the file and annotate the PR!
      run: npx tsx scripts/cli-scan.ts --format=sarif > depfirewall-results.sarif || true

    - name: Upload SARIF Artifact (Fallback for Private Repos)
      uses: actions/upload-artifact@v4
      with:
        name: DepFirewall SARIF Report
        path: depfirewall-results.sarif

    - name: Upload SARIF to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v4
      # This step requires GitHub Advanced Security on private repos. It is free for public repos.
      continue-on-error: true
      with:
        sarif_file: depfirewall-results.sarif
        category: DepFirewall Validation
