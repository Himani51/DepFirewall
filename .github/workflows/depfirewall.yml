name: DepFirewall Security Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    name: Dependency Firewall Scan

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Project Dependencies (for accurate registry checking)
      run: npm ci

    - name: Execute DepFirewall Scan (SARIF Format)
      # We use npx to run the scanner and output standard SARIF 
      # continue-on-error ensures that the action doesn't immediately crash if it finds a vulnerability,
      # allowing the SARIF uploader step to grab the file and annotate the PR!
      run: npx depfirewall --format=sarif > depfirewall-results.sarif
      continue-on-error: true

    - name: Upload SARIF to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        # This makes the alerts appear in the "Security" tab and inline on Pull Requests
        sarif_file: depfirewall-results.sarif
        category: DepFirewall Validation
